<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Investment Thinking Style</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
  background:#0b0f19;
  color:#fff;
}

/* HERO */
.hero{
  position:relative;

  /* 🔥关键：避免 mobile 100vh bug */
  min-height:100vh;
  min-height:100svh;

  display:flex;
  align-items:center;

  padding:60px 20px;
  overflow:hidden;
}

/* 背景图 */
.hero img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0.55;
  filter:contrast(1.1) saturate(0.9);
}

/* 🔥桌面+手机自适应渐变 */
.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background: linear-gradient(
    90deg,
    rgba(11,15,25,0.95) 0%,
    rgba(11,15,25,0.85) 40%,
    rgba(11,15,25,0.55) 70%,
    rgba(11,15,25,0.2) 100%
  );
}

/* 内容 */
.hero-content{
  position:relative;
  max-width:520px;
  width:100%;

  padding:24px;
  border-radius:16px;

  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(6px);
  border:1px solid rgba(255,255,255,0.08);
}

.tag{
  display:inline-block;
  padding:6px 10px;
  border:1px solid #ff0033;
  color:#ff0033;
  font-size:12px;
  margin-bottom:12px;
}

h1{
  font-size:26px;
  margin:10px 0;
  line-height:1.3;
}

.subtitle{
  font-size:13px;
  opacity:0.8;
  line-height:1.6;
}

.quote{
  margin-top:14px;
  font-size:14px;
  font-weight:bold;
}

.highlight{
  color:#ff0033;
}

.cta{
  margin-top:18px;
  display:inline-block;
  background:#06c755;
  color:#fff;
  padding:14px 20px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  width:100%;
  text-align:center;
}

/* SECTION */
.section{
  padding:40px 20px;
  max-width:900px;
  margin:auto;
}

.card{
  background:#111827;
  padding:18px;
  border-radius:12px;
  margin-bottom:15px;
  border:1px solid rgba(255,255,255,0.05);
}

.card h2{
  font-size:16px;
}

.small{
  font-size:13px;
  opacity:0.75;
  line-height:1.6;
}

/* fixed CTA */
.fixed{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#0b0f19;
  padding:12px;
  text-align:center;
  border-top:1px solid rgba(255,255,255,0.1);
}

.fixed a{
  display:block;
  background:#06c755;
  padding:14px;
  border-radius:10px;
  text-decoration:none;
  color:#fff;
  font-weight:bold;
}

/* 🔥移动端专用优化 */
@media (max-width: 768px){

  .hero{
    padding:40px 16px;
  }

  .overlay{
    /* 手机更偏“遮挡背景 + 提升可读性” */
    background: linear-gradient(
      180deg,
      rgba(11,15,25,0.95) 0%,
      rgba(11,15,25,0.85) 50%,
      rgba(11,15,25,0.5) 100%
    );
  }

  .hero-content{
    max-width:100%;
    padding:18px;
  }

  h1{
    font-size:22px;
  }

  .cta{
    font-size:14px;
  }
}
</style>
</head>

<body>

<div class="hero">

  <img src="hero.jpg" alt="hero">

  <div class="overlay"></div>

  <div class="hero-content">

    <div class="tag">INVESTMENT × SPEED × LOGIC</div>

    <h1>
      思考を変えろ。<br>
      市場はシンプルだ。
    </h1>

    <div class="subtitle">
      元ライブドア社長の思考スタイルから学ぶ<br>
      感情に依存しない株式投資
    </div>

    <div class="quote">
      「努力ではなく<span class="highlight">情報の速度</span>が結果を決める」
    </div>

    <a class="cta" href="https://line.me/" target="_blank">
      LINEで無料参加
    </a>

  </div>

</div>

<div class="section">

  <div class="card">
    <h2>なぜ投資家は負けるのか</h2>
    <p class="small">
      情報の遅さと判断の複雑化が原因。
    </p>
  </div>

  <div class="card">
    <h2>戦略の本質</h2>
    <p class="small">
      ・市場構造の理解<br>
      ・資金フロー分析<br>
      ・感情排除ルール
    </p>
  </div>

  <div class="card">
    <h2>思想ベース</h2>
    <p class="small">
      :contentReference[oaicite:0]{index=0}の効率主義思想をベースに設計。
    </p>
  </div>

</div>

<div class="fixed">
  <a href="https://line.me/">今すぐLINEで無料参加</a>
</div>

</body>
</html>
